<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Arte - Grimório de Sabores</title>
    <link rel="stylesheet" href="css.css">
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="menu-header">
        <a href="/index.html" class="btn-back">⬅ Voltar ao Isekai</a>
        <h1>Grimório de Sabores</h1>
        <p>Suba de nível com cada colherada! ✨</p>
    </header>

    <section id="galeria" class="anime-section">
        <h2 class="section-title">Registros do Multiverso 📸</h2>
        <div class="galeria-grid">
            
            <figure class="galeria-item">
                <button class="fullscreen-btn" onclick="abrirModal(this)">Tela Cheia</button>
                <img src="/imagens/naruto.png" alt="Rasen-Cream">
                <figcaption>Rasen-Cream ✨</figcaption>
            </figure>

            <figure class="galeria-item">
                <button class="fullscreen-btn" onclick="abrirModal(this)">Tela Cheia</button>
                <img src="/imagens/maple.png" alt="Cidade Isekai">
                <figcaption>Cream-Canon 🌃</figcaption>
            </figure>

            <figure class="galeria-item">
                <button class="fullscreen-btn" onclick="abrirModal(this)">Tela Cheia</button>
                <img src="/imagens/megumin.png" alt="Encontro de Guildas">
                <figcaption>Explosion⚔️</figcaption>
            </figure>

            <figure class="galeria-item">
                <button class="fullscreen-btn" onclick="abrirModal(this)">Tela Cheia</button>
                <img src="/imagens/acelerencer.png">
                <figcaption>Acellerencers ⚔️</figcaption>
            </figure>

            <figure class="galeria-item">
                <button class="fullscreen-btn" onclick="abrirModal(this)">Tela Cheia</button>
                <img src="/imagens/personagem.png">
                <figcaption>Guardian ⚔️</figcaption>
            </figure>

            <figure class="galeria-item">
                <button class="fullscreen-btn" onclick="abrirModal(this)">Tela Cheia</button>
                <img src="/imagens/gojo.png">
                <figcaption>Encontro de Guildas ⚔️</figcaption>
            </figure>

            </div>
    </section>

    <div id="modal-container" class="modal-overlay" onclick="fecharModal()">
        <span class="close-btn">&times;</span>
        <img id="img-modal" src="" alt="Imagem em destaque">
    </div>

    <script src="script.js"></script>
</body>
</html>
